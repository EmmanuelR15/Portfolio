<!doctype html>
<html lang="es">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Meta tags básicas para SEO -->

      name="description"

      property="og:title"
      content="Emmanuel Ruiz - Full Stack Developer | Portfolio"
    />
    <meta
      property="og:description"
      content="Portafolio profesional de Emmanuel Ruiz. Full Stack Developer especializado en React, Node.js y tecnologías modernas. Creando experiencias web excepcionales."

      property="og:image"
      content="https://emmanuz.netlify.app/images/profile/preview.png"

    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Portfolio de Emmanuel Ruiz" />
    <meta property="og:locale" content="es_ES" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Emmanuel Ruiz - Full Stack Developer" />

      name="twitter:description"
      content="Portafolio profesional de Emmanuel Ruiz. Full Stack Developer especializado en React, Node.js y tecnologías modernas."

      name="twitter:image"

    />

    <meta name="twitter:creator" content="@emmanuzdev" />

    <!-- URL Canónica -->
    <link rel="canonical" href="https://emmanuz.netlify.app" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.gstatic.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
